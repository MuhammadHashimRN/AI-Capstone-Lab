name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint + test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
      - name: Lint (ruff, errors only)
        run: ruff check . --select=E9,F63,F7,F82 --statistics || true
      - name: Smoke tests
        run: pytest tests/ -v
